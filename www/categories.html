<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidden Lion</title>
  <link rel="stylesheet" href="css/categories.css" />
  <script defer src="js/categories.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header>
    <h1 id="title">Hidden Lion</h1>
    <p class="subtitle" id="subtitle">Ваш гід по місту Львів</p>
    <button id="theme-toggle">🌙</button> 
  </header>

  <div class="search-container">
    <input type="text" id="search" placeholder="Пошук атракцій" />
    <button id="search-btn">🔍</button>
  </div>

  <div class="map-container">
    <div id="map"></div>
  </div>

  <div class="categories">
    <button id="landmarks-btn">
        <img src="img/landmarks.logo.png" alt="Landmarks" />
        <span id="landmarks-text">Пам'ятки</span>
    </button>
    <button id="restaurants-btn">
        <img src="img/logo.restaurants2.png" alt="Restaurants" />
        <span id="restaurants-text">Ресторани</span>
    </button>
    <button id="shopping-btn">
        <img src="img/shopping-logo2.png" alt="Shopping" />
        <span id="shopping-text">Шопінг</span>
    </button>
  </div>

  
  <div class="action-buttons">
    <button id="draw-btn">
      <img src="https://example.com/icon-draw.png" alt="Draw Icon">
      <span>Обвести фрагмент</span>
    </button>
    <button id="clear-btn">
      <img src="https://example.com/icon-clear.png" alt="Clear Icon">
      <span>Clear All</span>
    </button>
  </div>

  <div class="bottom-panel">
    <button id="home-btn">
      <img src="img/home-photo.png" alt="Home" />
    </button>
    <a href="menu.html">
      <button id="menu-btn">
        <img src="img/menu.png" alt="Menu" />
      </button>
    </a>
    
    <a href="settings.html">
      <button id="settings-btn">
        <img src="img/settings.png" alt="Settings" />
      </button>
    </a>
  </div>


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

  <script src="js/translations.js"></script>
</body>
</html>
