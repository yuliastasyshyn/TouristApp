<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="app-container">
        <h1 id="register-title">Реєстрація</h1>
        <form>
            <label id="label-username" for="username">Ім'я користувача</label>
            <input type="text" id="username" name="username" required><br>
            
            <label id="label-password" for="password">Пароль</label>
            <input type="password" id="password" name="password" required><br>

            <button type="submit" class="btn-register" id="registerBtn">Зареєструватися</button>
        </form>
    <p>Вже маєте акаунт? <a href="login.html">Увійти</a></p>
    </div>

    <script src="js/translations.js"></script>  
    <script src="js/register.js"></script>  


</body>
</html>
