<!DOCTYPE html> 
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">
    <title>Персональний гід - Карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            height: 100%; 
            width: 100%;  
        }
        button#backBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background-color: white;
            border: 1px solid #ccc;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="backBtn">Назад</button> 

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <script>
        var map = L.map('map').setView([49.8383, 24.0232], 13); 

       
        function getTileLayer(lang) {
            const tileLayers = {
                en: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', // Для англійської мови
                uk: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', // Для української мови
            };
            return tileLayers[lang];
        }

        // Функція для оновлення перекладів і карти
        function applyTranslation(lang) {
            const translations = {
                en: {
                    welcomeMessage: "Welcome to Lviv!",
                    backBtnText: "Back"
                },
                uk: {
                    welcomeMessage: "Ласкаво просимо до Львова!",
                    backBtnText: "Назад"
                }
            };

            // Оновлення карти
            L.tileLayer(getTileLayer(lang), {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Оновлення маркера на карті
            L.marker([49.8383, 24.0232]).addTo(map)
                .bindPopup(translations[lang].welcomeMessage)
                .openPopup();

            // Оновлення кнопки назад
            document.getElementById('backBtn').innerText = translations[lang].backBtnText;
        }

        // Отримуємо збережену мову або встановлюємо українську за замовчуванням
        const savedLanguage = localStorage.getItem("language") || "uk";  
        applyTranslation(savedLanguage); 

        
        window.changeLanguage = function(lang) {
            localStorage.setItem("language", lang);  // Зберігаємо вибрану мову
            applyTranslation(lang);  // Оновлюємо переклад
        };

        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'index.html'; 
        });
    </script>

    <script src="js/translations.js"></script> 
    <script src="js/map.js"></script>
</body>
</html>
